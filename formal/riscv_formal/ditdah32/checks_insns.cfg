[options]
isa rv32ic
nret 1
solver z3

[depth]
insn 12

[defines]
`define YOSYS
`define RISCV_FORMAL_ALIGNED_MEM
`define RISCV_FORMAL_VALIDADDR(addr) 1'b1

[assume !.*]
// Per-RVC-format register restriction for RV32E. Uncompressed insns have
// rs1/rs2/rd at fixed positions and all must be < x16. Compressed insns
// have format-dependent register positions:
//   CR  (insn[1:0]=10, funct3=100): rd/rs1 at [11:7] (5b), rs2 at [6:2] (5b)
//   CI  (insn[1:0]=10, funct3={000,001,010,011}): rd/rs1 at [11:7] (5b)
//   CI  (insn[1:0]=01, funct3={000,010,011}): rd/rs1 at [11:7] (5b)
//   CSS (insn[1:0]=10, funct3={101,110,111}): rs2 at [6:2] (5b)
//   CA/CB/CIW/CL/CS (q0 and q1 funct3=100/110/111 etc.): 3-bit fields,
//     already < 8 < 16, no constraint needed.
//   CJ (insn[1:0]=01, funct3={001,101}): no register field.
always @* if (!reset && rvfi_valid[0]) begin
    if (rvfi_insn[1:0] == 2'b11) begin
        assume(rvfi_insn[11:7] < 5'd16);
        assume(rvfi_insn[19:15] < 5'd16);
        assume(rvfi_insn[24:20] < 5'd16);
    end else if (rvfi_insn[1:0] == 2'b10) begin
        // Quadrant 2
        case (rvfi_insn[15:13])
            3'b000, 3'b001, 3'b010, 3'b011:
                assume(rvfi_insn[11:7] < 5'd16);  // CI (c.slli/c.lwsp etc.)
            3'b100: begin
                assume(rvfi_insn[11:7] < 5'd16);  // CR rd/rs1
                assume(rvfi_insn[6:2]  < 5'd16);  // CR rs2
            end
            3'b101, 3'b110, 3'b111:
                assume(rvfi_insn[6:2]  < 5'd16);  // CSS rs2
            default: ;
        endcase
    end else if (rvfi_insn[1:0] == 2'b01) begin
        // Quadrant 1
        case (rvfi_insn[15:13])
            3'b000, 3'b010, 3'b011:
                assume(rvfi_insn[11:7] < 5'd16);  // CI (c.addi/c.li/c.lui/c.addi16sp)
            default: ;  // CJ / CB / CA: 3-bit or no register fields
        endcase
    end
    // Quadrant 0: CIW/CL/CS, all 3-bit register fields, no constraint.
    assume(!rvfi_intr[0]);
    assume(!rvfi_trap[0]);
end

[script-defines]
plugin -i @SLANG_SO@
read_slang -I@basedir@/cores/@core@ @basedir@/cores/@core@/ditdah32_trace_top.sv @basedir@/cores/@core@/DitDah32.sv @basedir@/cores/@core@/DitDah32Gpr.sv @basedir@/cores/@core@/DitDah32_DV.sv @basedir@/cores/@core@/layers-DitDah32-DV.sv --top ditdah32_trace_top

[verilog-files]
@basedir@/cores/@core@/wrapper.sv

[options]
isa rv32ec
nret 1
solver z3

[depth]
csrw_mstatus_ch0 12
csrw_mie_ch0 12
csrw_mtvec_ch0 12
csrw_mscratch_ch0 12
csrw_mepc_ch0 12
csrw_mcause_ch0 12
csrw_mtval_ch0 12
csrw_mvendorid_ch0 12
csrw_marchid_ch0 12
csrw_mimpid_ch0 12
csrw_mhartid_ch0 12
csr_ill_ch0 12

[csrs]
mstatus zero_mask="32'hffffe777"
misa const="32'h40000014"
mie zero_mask="32'hfffff777"
mtvec zero_mask="32'h00000003"
mscratch any
mepc zero_mask="32'h00000001"
mcause
mtval
mip const="32'h00000000"
mvendorid const="32'h00000000"
marchid const="32'h00000000"
mimpid const="32'h00000000"
mhartid const="32'h00000000"

[illegal_csrs]
301 m w
344 m w
7c0 m rw

[defines]
`define YOSYS
`define RISCV_FORMAL_ALIGNED_MEM
`define RISCV_FORMAL_VALIDADDR(addr) 1'b1
`define DITDAH32_RVFI_CSR_TRACE

[script-defines]
plugin -i @SLANG_SO@
read_slang -I@basedir@/cores/@core@ @basedir@/cores/@core@/ditdah32_trace_top.sv @basedir@/cores/@core@/DitDah32.sv @basedir@/cores/@core@/DitDah32Gpr.sv @basedir@/cores/@core@/DitDah32_DV.sv @basedir@/cores/@core@/layers-DitDah32-DV.sv --top ditdah32_trace_top

[verilog-files]
@basedir@/cores/@core@/wrapper.sv

[options]
isa rv32ec
nret 1
solver z3

[depth]
liveness_ch0 1 4 14

[defines]
`define YOSYS
`define RISCV_FORMAL_ALIGNED_MEM
`define RISCV_FORMAL_VALIDADDR(addr) 1'b1

[assume !liveness_ch0]
always @* if (!reset && cycle == `RISCV_FORMAL_TRIG_CYCLE && rvfi_valid[0]) assume(rvfi_insn[31:0] != 32'h10500073);

[verilog-files]
@basedir@/cores/@core@/wrapper.sv
@basedir@/cores/@core@/DitDah32.sv

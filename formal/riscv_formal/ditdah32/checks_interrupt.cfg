[options]
isa rv32ec
nret 1
solver z3

[depth]
pc_fwd_ch0 1 12
pc_bwd_ch0 1 12
unique_ch0 1 10 16

[defines]
`define YOSYS
`define RISCV_FORMAL_ALIGNED_MEM
`define RISCV_FORMAL_VALIDADDR(addr) 1'b1
`define DITDAH32_RVFI_ENABLE_IRQ
`define DITDAH32_RVFI_STANDARD_INTR

[script-defines]
plugin -i @SLANG_SO@
read_slang -I@basedir@/cores/@core@ @basedir@/cores/@core@/ditdah32_trace_top.sv @basedir@/cores/@core@/DitDah32.sv @basedir@/cores/@core@/DitDah32_DV.sv @basedir@/cores/@core@/layers-DitDah32-DV.sv --top ditdah32_trace_top

[verilog-files]
@basedir@/cores/@core@/wrapper.sv

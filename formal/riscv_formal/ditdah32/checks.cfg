[options]
isa rv32ec
nret 1
solver z3

[depth]
pc_fwd 1 10
pc_bwd 1 10
reg 1 12
unique 1 10 16
causal_mem 1 20
cover 1 10

[defines]
`define YOSYS
`define RISCV_FORMAL_ALIGNED_MEM
`define RISCV_FORMAL_VALIDADDR(addr) 1'b1

[verilog-files]
@basedir@/cores/@core@/wrapper.sv
@basedir@/cores/@core@/DitDah32.sv

[cover]
always @* if (!reset) cover (channel[0].cnt_insns >= 1);

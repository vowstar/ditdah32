name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # zaozi pins a from-source CIRCT/LLVM/MLIR (no public binary cache), so a
      # cold runner spends hours compiling the toolchain. Persist /nix/store
      # across runs: the first release builds and caches it, later runs restore.
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 8G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Build clean no-trace RTL
        run: nix develop .#smoke --command build-ditdah32 --no-trace

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            result/DitDah32.sv \
            --title "DitDah32 ${{ github.ref_name }}" \
            --notes "Signed-off RV32EC control core for always-on and PHY control. Synthesizable no-trace RTL, built in CI by nix. See README for area, frequency, power, and benchmark numbers."

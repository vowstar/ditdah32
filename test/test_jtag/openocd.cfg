adapter driver remote_bitbang
remote_bitbang host 127.0.0.1
remote_bitbang port $::env(DITDAH32_RBB_PORT)
transport select jtag
adapter speed 1000
reset_config trst_only

jtag newtap ditdah32 cpu -irlen 5 -expected-id 0x00000001
target create ditdah32.cpu riscv -chain-position ditdah32.cpu
riscv set_reset_timeout_sec 120
riscv set_command_timeout_sec 120

gdb_port $::env(DITDAH32_GDB_PORT)
tcl_port disabled
telnet_port disabled

init
halt
